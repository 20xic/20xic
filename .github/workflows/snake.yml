name: generate snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: generate snake gif/svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: 20xic
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#25e0d8&color_dots=#123a5a,#1c5a6a,#1f8a8a,#22b5b0,#25e0d8
            dist/snake-dark.svg?palette=github-dark&color_snake=#25e0d8&color_dots=#123a5a,#1c5a6a,#1f8a8a,#22b5b0,#25e0d8

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}